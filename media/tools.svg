<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 478" width="880" height="478" font-family="'Segoe UI',system-ui,sans-serif">
<style>
  .dot { animation: run 3s linear infinite; opacity:0; }
  @keyframes run { 0% { transform: translate(var(--x0), var(--y)); opacity:0 } 15%,85% { opacity:1 }
                    100% { transform: translate(var(--x1), var(--y)); opacity:0 } }
  .card { transform-box: fill-box; transform-origin: center; animation: pulse 3.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.018) } }
  .led { animation: led 2.2s ease-in-out infinite; }
  @keyframes led { 0%,100% { opacity:.35 } 50% { opacity:1 } }
</style>
<rect x="1" y="1" width="878" height="476" rx="16" fill="#0e0e16" stroke="#7c5cff" stroke-opacity="0.28"/>
<text x="26" y="34" fill="#e8e8f4" font-size="20" font-weight="700">30 strumenti integrati (+ MCP dinamici)</text>
<text x="26" y="54" fill="#9a9ab0" font-size="12.5">il ciclo agentico: la grammatica GBNF forza JSON sempre valido · le azioni sensibili chiedono consenso · il risultato torna al modello</text>

<!-- flusso agentico -->
<g>
  <rect x="20" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
  <text x="115" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">① Agente ReAct</text>
  <text x="115" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">fino a 5 passi per turno</text>
  <text x="115" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">decide QUALE strumento</text>
</g>
<g>
  <rect x="236" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
  <text x="331" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">② Grammatica GBNF</text>
  <text x="331" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">la chiamata è JSON valido</text>
  <text x="331" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">per costruzione, mai rotto</text>
</g>
<g>
  <rect x="452" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
  <text x="547" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">③ Consenso</text>
  <text x="547" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">le azioni sensibili chiedono</text>
  <text x="547" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">permesso · scelta ricordata</text>
</g>
<g>
  <rect x="668" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#8fc9a6" stroke-opacity="0.5"/>
  <text x="763" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">④ Esecuzione</text>
  <text x="763" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">risultato → di nuovo al</text>
  <text x="763" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">modello, che risponde</text>
</g>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:210px;--x1:236px;--y:99px;animation-delay:0s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:210px;--x1:236px;--y:99px;animation-delay:1s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:426px;--x1:452px;--y:99px;animation-delay:0.4s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:426px;--x1:452px;--y:99px;animation-delay:1.4s"/>
<circle class="dot" r="3.5" fill="#8fc9a6" style="--x0:642px;--x1:668px;--y:99px;animation-delay:0.8s"/>
<circle class="dot" r="3.5" fill="#8fc9a6" style="--x0:642px;--x1:668px;--y:99px;animation-delay:1.8s"/>
<text x="219" y="103" fill="#7c5cff" fill-opacity="0.5" font-size="14">›</text>
<text x="435" y="103" fill="#7c5cff" fill-opacity="0.5" font-size="14">›</text>
<text x="651" y="103" fill="#8fc9a6" fill-opacity="0.5" font-size="14">›</text>

<!-- griglia categorie -->
<g class="card" style="animation-delay:0s">
  <rect x="20" y="152" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="40" cy="176" r="4" fill="#7c5cff"/>
  <text x="54" y="181" fill="#e8e8f4" font-size="14" font-weight="700">Core</text>
  <text x="40" y="203" fill="#9a9ab0" font-size="11">datetime · calculator</text>
  <text x="40" y="220" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">ora, date relative, conti sempre esatti</text>
</g>
<g class="card" style="animation-delay:0.2s">
  <rect x="304" y="152" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="324" cy="176" r="4" fill="#7c5cff" style="animation-delay:0.3s"/>
  <text x="338" y="181" fill="#e8e8f4" font-size="14" font-weight="700">Web</text>
  <text x="324" y="203" fill="#9a9ab0" font-size="11">web_fetch · web_search</text>
  <text x="324" y="220" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">guardia anti-SSRF su ogni redirect</text>
</g>
<g class="card" style="animation-delay:0.4s">
  <rect x="588" y="152" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="608" cy="176" r="4" fill="#7c5cff" style="animation-delay:0.6s"/>
  <text x="622" y="181" fill="#e8e8f4" font-size="14" font-weight="700">Meteo &amp; posizione</text>
  <text x="608" y="203" fill="#9a9ab0" font-size="11">weather · set_location</text>
  <text x="608" y="220" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">GPS o override manuale</text>
</g>
<g class="card" style="animation-delay:0.6s">
  <rect x="20" y="248" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="40" cy="272" r="4" fill="#7c5cff" style="animation-delay:0.9s"/>
  <text x="54" y="277" fill="#e8e8f4" font-size="14" font-weight="700">Email <tspan fill="#9a9ab0" font-size="10" font-weight="400">· 🔒 consenso</tspan></text>
  <text x="40" y="299" fill="#9a9ab0" font-size="11">recent · sent · search · reply · draft · send</text>
  <text x="40" y="316" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">IMAP/SMTP su rustls, archivio cifrato</text>
</g>
<g class="card" style="animation-delay:0.8s">
  <rect x="304" y="248" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="324" cy="272" r="4" fill="#7c5cff" style="animation-delay:1.2s"/>
  <text x="338" y="277" fill="#e8e8f4" font-size="14" font-weight="700">Agenda</text>
  <text x="324" y="299" fill="#9a9ab0" font-size="11">add · list · search · delete</text>
  <text x="324" y="316" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">date relative in italiano, titoli cifrati</text>
</g>
<g class="card" style="animation-delay:1.0s">
  <rect x="588" y="248" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="608" cy="272" r="4" fill="#7c5cff" style="animation-delay:1.5s"/>
  <text x="622" y="277" fill="#e8e8f4" font-size="14" font-weight="700">File <tspan fill="#9a9ab0" font-size="10" font-weight="400">· 🔒 consenso</tspan></text>
  <text x="608" y="299" fill="#9a9ab0" font-size="11">list · read · search · write · move · delete</text>
  <text x="608" y="316" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">confinati a $HOME, PDF → testo</text>
</g>
<g class="card" style="animation-delay:1.2s">
  <rect x="20" y="344" width="272" height="84" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.35"/>
  <circle class="led" cx="40" cy="368" r="4" fill="#7c5cff" style="animation-delay:1.8s"/>
  <text x="54" y="373" fill="#e8e8f4" font-size="14" font-weight="700">Note</text>
  <text x="40" y="395" fill="#9a9ab0" font-size="11">add · list · search</text>
  <text x="40" y="412" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">appunti cifrati, ricerca semantica</text>
</g>
<g class="card" style="animation-delay:1.4s">
  <rect x="304" y="344" width="272" height="84" rx="12" fill="#171724" stroke="#8fc9a6" stroke-opacity="0.5"/>
  <circle class="led" cx="324" cy="368" r="4" fill="#8fc9a6" style="animation-delay:2.1s"/>
  <text x="338" y="373" fill="#e8e8f4" font-size="14" font-weight="700">Peer AI↔AI <tspan fill="#8fc9a6" font-size="10" font-weight="700">nuovo</tspan></text>
  <text x="324" y="395" fill="#9a9ab0" font-size="11">peer_connect · peer_ask · peer_propose_slot</text>
  <text x="324" y="412" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">il tuo Liara parla col Liara di un contatto, E2E</text>
</g>
<g class="card" style="animation-delay:1.6s">
  <rect x="588" y="344" width="272" height="84" rx="12" fill="#171724" stroke="#8fc9a6" stroke-opacity="0.5"/>
  <circle class="led" cx="608" cy="368" r="4" fill="#8fc9a6" style="animation-delay:2.4s"/>
  <text x="622" y="373" fill="#e8e8f4" font-size="14" font-weight="700">Telefono <tspan fill="#8fc9a6" font-size="10" font-weight="700">nuovo</tspan> <tspan fill="#9a9ab0" font-size="10" font-weight="400">· 🔒</tspan></text>
  <text x="608" y="395" fill="#9a9ab0" font-size="11">phone_call · sms_send</text>
  <text x="608" y="412" fill="#9a9ab0" font-size="10.5" fill-opacity="0.8">hand-off all'app di sistema, zero permessi</text>
</g>

<text x="440" y="458" fill="#9a9ab0" font-size="11.5" text-anchor="middle">…e ogni server <tspan fill="#7c5cff" font-weight="700">MCP</tspan> configurato aggiunge i suoi strumenti a runtime — tutti dietro il consenso</text>
</svg>
