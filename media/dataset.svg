<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 230" width="860" height="230" font-family="'Segoe UI',system-ui,sans-serif">
<style>
  .card { animation: flow 5.4s linear infinite; opacity:0; }
  @keyframes flow {
    0% { transform: translate(196px,98px) scale(.6); opacity:0 }
    12% { opacity:1 }
    50% { transform: translate(430px,98px) scale(1); opacity:1 }
    78% { transform: translate(628px,98px) scale(.7); opacity:1 }
    92%,100% { transform: translate(660px,98px) scale(.5); opacity:0 }
  }
  .pulse { animation: pulse 2.7s ease-in-out infinite; transform-origin: 762px 115px; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.09); } }
  .ping { animation: ping 2.7s ease-out infinite; transform-origin:118px 115px; }
  @keyframes ping { 0% { r:44; opacity:.5 } 70%,100% { r:64; opacity:0 } }
</style>
<rect x="1" y="1" width="858" height="228" rx="16" fill="#0e0e16" stroke="#7c5cff" stroke-opacity="0.28"/>
<text x="30" y="40" fill="#e8e8f4" font-size="21" font-weight="700">Generazione del dataset</text>
<text x="30" y="63" fill="#9a9ab0" font-size="13">il 32B "insegna" al piccolo — tool-calling italiano, curato a mano</text>

<!-- teacher 32B -->
<circle class="ping" cx="118" cy="115" r="44" fill="none" stroke="#7c5cff"/>
<circle cx="118" cy="115" r="44" fill="#181826" stroke="#7c5cff" stroke-opacity="0.7"/>
<text x="118" y="110" fill="#e8e8f4" font-size="19" font-weight="800" text-anchor="middle">32B</text>
<text x="118" y="130" fill="#9a9ab0" font-size="10" text-anchor="middle">teacher ☁️</text>

<!-- flusso di esempi -->
<g class="card" style="animation-delay:0.0s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">📅</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">calendar_add</text>
    </g>
<g class="card" style="animation-delay:0.9s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">🌦️</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">weather</text>
    </g>
<g class="card" style="animation-delay:1.8s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">✉️</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">email_reply</text>
    </g>
<g class="card" style="animation-delay:2.7s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">🌐</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">web_search</text>
    </g>
<g class="card" style="animation-delay:3.6s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">📝</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">note_add</text>
    </g>
<g class="card" style="animation-delay:4.5s">
      <rect width="150" height="34" rx="8" fill="#1a1a28" stroke="#7c5cff" stroke-opacity="0.5"/>
      <text x="12" y="22" font-size="14">🧮</text>
      <text x="34" y="22" fill="#e8e8f4" font-size="13" font-family="monospace">calculator</text>
    </g>

<!-- pila dataset -->
<g transform="translate(560,150)">
  <rect x="0" y="0" width="120" height="10" rx="2" fill="#7c5cff" fill-opacity="0.35"/>
  <rect x="0" y="-13" width="120" height="10" rx="2" fill="#7c5cff" fill-opacity="0.55"/>
  <rect x="0" y="-26" width="120" height="10" rx="2" fill="#7c5cff" fill-opacity="0.8"/>
</g>
<text x="620" y="188" fill="#9a9ab0" font-size="11" text-anchor="middle">🇮🇹 dataset</text>

<!-- student 1.58-bit -->
<g class="pulse">
  <rect x="716" y="86" width="92" height="58" rx="12" fill="#181826" stroke="#8fc9a6" stroke-opacity="0.7"/>
  <text x="762" y="112" fill="#8fc9a6" font-size="15" font-weight="800" text-anchor="middle">1.58-bit</text>
  <text x="762" y="130" fill="#9a9ab0" font-size="10" text-anchor="middle">fine-tuning</text>
</g>
<text x="700" y="160" fill="#9a9ab0" font-size="20">→</text>
</svg>