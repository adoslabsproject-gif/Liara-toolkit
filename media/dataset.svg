<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:426px;--x1:452px;--y:99.0px;animation-delay:0.25s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:426px;--x1:452px;--y:99.0px;animation-delay:0.85s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:426px;--x1:452px;--y:99.0px;animation-delay:1.45s"/>
<text x="435.0" y="103.0" fill="#7c5cff" fill-opacity="0.5" font-size="14">›</text>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:642px;--x1:668px;--y:99.0px;animation-delay:0.5s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:642px;--x1:668px;--y:99.0px;animation-delay:1.1s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:642px;--x1:668px;--y:99.0px;animation-delay:1.7s"/>
<text x="651.0" y="103.0" fill="#7c5cff" fill-opacity="0.5" font-size="14">›</text>
<text x="26" y="172" fill="#9a9ab0" font-size="11">studenti (deep FT · QAT/STE ternario · dataset neutro, reso per-dialetto a training):</text>
<g class="pulse" style="transform-origin:95.0px 204.0px">
      <rect x="20" y="182" width="150" height="44" rx="10" fill="#171724" stroke="#8fc9a6" stroke-opacity="0.6"/>
      <text x="95.0" y="202" fill="#8fc9a6" font-size="13.5" font-weight="800" text-anchor="middle">1.58-bit</text>
      <text x="95.0" y="218" fill="#9a9ab0" font-size="10" text-anchor="middle">ternario</text>
    </g>
<g style="transform-origin:259.0px 204.0px">
      <rect x="184" y="182" width="150" height="44" rx="10" fill="#171724" stroke="#7c5cff" stroke-opacity="0.6"/>
      <text x="259.0" y="202" fill="#7c5cff" font-size="13.5" font-weight="800" text-anchor="middle">Gemma 4</text>
      <text x="259.0" y="218" fill="#9a9ab0" font-size="10" text-anchor="middle">2× nativi</text>
    </g>
<g style="transform-origin:423.0px 204.0px">
      <rect x="348" y="182" width="150" height="44" rx="10" fill="#171724" stroke="#7c5cff" stroke-opacity="0.6"/>
      <text x="423.0" y="202" fill="#7c5cff" font-size="13.5" font-weight="800" text-anchor="middle">Qwen</text>
      <text x="423.0" y="218" fill="#9a9ab0" font-size="10" text-anchor="middle">1.7B · 4B</text>
