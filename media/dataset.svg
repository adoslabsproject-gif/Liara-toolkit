<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" width="880" height="250" font-family="'Segoe UI',system-ui,sans-serif">
<style>
  .dot { animation: run 3s linear infinite; opacity:0; }
  @keyframes run { 0% { transform: translate(var(--x0), var(--y)); opacity:0 } 15%,85% { opacity:1 }
                    100% { transform: translate(var(--x1), var(--y)); opacity:0 } }
  .pulse { animation: pulse 2.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1) } 50% { transform: scale(1.06) } }
</style>
<rect x="1" y="1" width="878" height="248" rx="16" fill="#0e0e16" stroke="#7c5cff" stroke-opacity="0.28"/>
<text x="26" y="34" fill="#e8e8f4" font-size="20" font-weight="700">Generazione del dataset</text>
<text x="26" y="54" fill="#9a9ab0" font-size="12.5">pipeline data-centric — i teacher generano, 16 gate filtrano, il piccolo impara (deep fine-tuning)</text>
<g>
      <rect x="20" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="115.0" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">① Multi-teacher</text>
      <text x="115.0" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">Qwen3-32B · Magnum-72B</text>
      <text x="115.0" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">Gemma-27B · gold · a rotazione</text>
    </g>
<g>
      <rect x="236" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="331.0" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">② Genera</text>
      <text x="331.0" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">tool-call · conversazioni</text>
      <text x="331.0" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">casi limite (IT)</text>
    </g>
<g>
      <rect x="452" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="547.0" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">③ 16 gate</text>
      <text x="547.0" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">dedup · giudice · bilancia</text>
      <text x="547.0" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">esiti tipizzati</text>
    </g>
<g>
      <rect x="668" y="64" width="190" height="70" rx="12" fill="#171724" stroke="#7c5cff" stroke-opacity="0.45"/>
      <text x="763.0" y="90" fill="#e8e8f4" font-size="15" font-weight="700" text-anchor="middle">④ SFT + KTO</text>
      <text x="763.0" y="109" fill="#9a9ab0" font-size="10.5" text-anchor="middle">PASS→SFT · Soft→KTO−</text>
      <text x="763.0" y="124" fill="#9a9ab0" font-size="10.5" text-anchor="middle">→ studenti</text>
    </g>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:210px;--x1:236px;--y:99.0px;animation-delay:0.0s"/>
<circle class="dot" r="3.5" fill="#7c5cff" style="--x0:210px;--x1:236px;--y:99.0px;animation-delay:0.6s"/>
