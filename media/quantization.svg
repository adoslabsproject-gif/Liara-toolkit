<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 210" width="860" height="210" font-family="'Segoe UI',system-ui,sans-serif">
<style>
  .w { animation: q 5s ease-in-out infinite; }
  @keyframes q { 0%,26% { fill: var(--a); } 46%,78% { fill: var(--b); } 96%,100% { fill: var(--a); } }
  .fadeA { animation: fa 5s ease-in-out infinite; } .fadeB { animation: fb 5s ease-in-out infinite; }
  @keyframes fa { 0%,26% { opacity:1 } 40%,100% { opacity:0 } 96%,100% { opacity:1 } }
  @keyframes fb { 0%,32% { opacity:0 } 46%,84% { opacity:1 } 96%,100% { opacity:0 } }
</style>
<rect x="1" y="1" width="858" height="208" rx="16" fill="#0e0e16" stroke="#7c5cff" stroke-opacity="0.28"/>
<text x="30" y="42" fill="#e8e8f4" font-size="21" font-weight="700">Quantizzazione</text>
<text x="30" y="66" fill="#9a9ab0" font-size="13">i pesi del modello, compressi</text>
<!-- etichette che si alternano -->
<g class="fadeA">
  <text x="30" y="120" fill="#e8e8f4" font-size="30" font-weight="800">FP16</text>
  <text x="30" y="146" fill="#7c5cff" font-size="14" font-weight="600">16 bit / peso · 3.4 GB</text>
</g>
<g class="fadeB">
  <text x="30" y="120" fill="#8fc9a6" font-size="30" font-weight="800">1.58 bit</text>
  <text x="30" y="146" fill="#7c5cff" font-size="14" font-weight="600">ternario {-1, 0, +1} · ~0.4 GB</text>
</g>
<text x="30" y="180" fill="#9a9ab0" font-size="12">BitNet b1.58 — 8× più leggero, gira ovunque</text>
